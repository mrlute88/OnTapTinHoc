<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Tin học Tiểu học</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="page-wrapper">
        <header>
            <div class="logo">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-laptop-code"></i>
                </div>
                <h1>Vui Học Tin Học</h1>
            </div>
            <p class="subtitle">Cùng ôn tập và khám phá thế giới máy tính nhé!</p>
        </header>

        <main id="app-container">
            <!-- Dynamic content will be injected here by app.js -->
        </main>

        <footer>
            <div class="footer-character">
                <i class="fa-solid fa-robot bounce-anim"></i>
            </div>
            <p>Thiết kế dành cho các bạn học sinh Lớp 3, Lớp 4 và Lớp 5</p>
            <div style="margin-top: 15px;">
                <button class="btn-admin-link" onclick="playSelectSound(); renderAdminLogin()"><i class="fa-solid fa-user-tie"></i> Khu vực Giáo viên</button>
            </div>
        </footer>
    </div>

    <!-- Cấu hình Môi trường -->
    <script src="env.js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
